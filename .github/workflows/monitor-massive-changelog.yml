name: Monitor Massive API Changelog

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Fetch and parse RSS feed
        id: check
        run: |
          # Fetch the RSS feed
          curl -s "https://massive.com/changelog/rss.xml" > /tmp/changelog-rss.xml

          # Compute lookback timestamp and export for Python
          SINCE=$(date -d '21 days ago' +%s 2>/dev/null || date -v-21d +%s)
          export SINCE

          # Extract title, pubDate, link, and description from each item
          python3 << 'PYTHON_SCRIPT'
          import xml.etree.ElementTree as ET
          import json
          from datetime import datetime, timezone
          import os

          tree = ET.parse('/tmp/changelog-rss.xml')
          root = tree.getroot()

          since_timestamp = int(os.environ['SINCE'])
          entries = []

          for item in root.findall('.//item'):
              title = item.find('title').text if item.find('title') is not None else ''
              pub_date = item.find('pubDate').text if item.find('pubDate') is not None else ''
              link = item.find('link').text if item.find('link') is not None else ''
              description = item.find('description').text if item.find('description') is not None else ''

              # Parse RFC 2822 date format from RSS
              if pub_date:
                  try:
                      dt = datetime.strptime(pub_date, '%a, %d %b %Y %H:%M:%S %Z')
                      timestamp = int(dt.replace(tzinfo=timezone.utc).timestamp())

                      if timestamp > since_timestamp:
                          entries.append({
                              'title': title,
                              'date': pub_date,
                              'link': link,
                              'description': description
                          })
                  except:
                      pass

          # Save to JSON
          with open('/tmp/new-entries.json', 'w') as f:
              json.dump(entries, f, indent=2)

          # Output count
          print(f"Found {len(entries)} new entries")
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"new_count={len(entries)}\n")
              f.write(f"has_new={'true' if len(entries) > 0 else 'false'}\n")
          PYTHON_SCRIPT

      - name: Checkout repository
        if: steps.check.outputs.has_new == 'true'
        uses: actions/checkout@v6

      - name: Configure git and date stamp
        if: steps.check.outputs.has_new == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          echo "DATE_STAMP=$(date +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Format changelog entries
        if: steps.check.outputs.has_new == 'true'
        run: |
          python3 << 'PYTHON_SCRIPT'
          import json

          with open('/tmp/new-entries.json', 'r') as f:
              entries = json.load(f)

          md_lines = []
          for entry in entries:
              md_lines.append(f"### {entry['title']}")
              md_lines.append(f"**Published:** {entry['date']}")
              md_lines.append(entry['description'])
              if entry['link']:
                  md_lines.append(f"[Read more]({entry['link']})")
              md_lines.append("---")
              md_lines.append("")

          with open('formatted-entries.md', 'w') as f:
              f.write('\n'.join(md_lines))
          PYTHON_SCRIPT

      - name: Set up uv
        if: steps.check.outputs.has_new == 'true'
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install Python dependencies
        if: steps.check.outputs.has_new == 'true'
        run: uv sync

      - name: Run Claude Code to update streams and open PR
        if: steps.check.outputs.has_new == 'true'
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.CLAUDE_TAP_MASSIVE_API_KEY }}
          prompt: |
            You are updating the tap-massive Singer tap based on new Massive API changelog entries.

            ## Inputs available in the working directory
            - `formatted-entries.md` — the new changelog entries (READ THIS)
            - `CLAUDE.md` — project conventions (READ THIS FIRST, fully)
            - `tap_massive/*.py` — stream classes
            - `meltano.yml` — stream config and select list
            - `./lint.sh` — runs black, isort, flake8 (already installed via `uv sync`)

            ## Task
            1. Read `CLAUDE.md` fully. Internalize:
               - The class hierarchy (MassiveRestStream → OptionalTickerPartitionStream → asset-specific bases → concrete streams)
               - The cross-asset base class pattern (BaseTickerTypesStream, BaseExchangesStream, BaseConditionCodesStream)
               - Endpoint version prefixes (`/v3/`, `/vX/`, `/stocks/v1/`, `/stocks/financials/v1/`)
               - Code conventions (snake_case, singer_sdk types, no inline imports, Decimal for numerics)
            2. Read `formatted-entries.md`.
            3. For each changelog entry, classify it:
               - **New endpoint announced** → ADD a new stream class following existing patterns. Look at neighboring streams in the most relevant file (e.g., new stocks endpoint → `tap_massive/fundamental_streams.py` or `tap_massive/stock_streams.py`).
               - **New field(s) on an existing endpoint** → ADD fields to the existing schema.
               - **Bug fix or data correction with no schema change** → SKIP (do nothing).
               - **Deprecation announcement** → SKIP (do not remove until explicitly told to).
            4. Make the code changes:
               - Follow existing patterns — read neighboring stream classes before writing new ones
               - Reuse base classes where possible (don't duplicate logic)
               - Field names snake_case; use `th.StringType`, `th.IntegerType`, `th.NumberType`, `th.BooleanType`, `th.DateType`, `th.DateTimeType`, `th.ArrayType`, `th.ObjectType`
               - Never auto-discover schemas — always declare them explicitly
               - All imports at top of file
            5. If you created a new stream, add it to `meltano.yml` under both the `select:` list and the appropriate stream `config:` block. Match the naming convention in CLAUDE.md (e.g., `stock_` prefix for stock-specific streams).
            6. Run `./lint.sh` and fix all reported issues. Re-run until clean.
            7. **Self-review the diff** (`git diff`):
               - DRY: any duplicated logic that should use a base class?
               - SOLID: are responsibilities cleanly separated?
               - Are field names snake_case throughout?
               - Did you remove anything that should not have been removed?
               - Are there unused imports or dead code?
               - Simplify anything over-engineered.
            8. If changes were made:
               - Create branch: `massive-api-update-${{ env.DATE_STAMP }}`
               - Commit with a clear message
               - Push the branch
               - Open a PR titled `[Massive API] Schema updates — ${{ env.DATE_STAMP }}` to `main` using `gh pr create` with a body that includes:
                 - A summary of what changed and why (reference the changelog entry)
                 - The list of files changed
                 - The full changelog excerpt from `formatted-entries.md`
                 - A testing checklist (`./lint.sh`, `meltano el tap-massive target-jsonl --select <stream>.*`)

            ## Critical rules
            - Use `uv` for everything; never run `python`/`pip`/`poetry` directly
            - No silent failures: if `lint.sh` keeps failing, report what's wrong rather than hiding it
            - Never push to `main` directly
            - Never amend commits; create new ones if you need to fix something
            - If no code changes are warranted (e.g., all entries are bug fixes), exit without creating a branch or PR

          claude_args: |
            --max-turns 30
            --model claude-sonnet-4-6
            --allowedTools "Read,Write,Edit,Bash(git:*),Bash(gh:*),Bash(./lint.sh),Bash(uv:*),Bash(meltano:*),Bash(python3:*),Bash(ls:*),Bash(cat:*),Bash(grep:*),Bash(find:*),Bash(rg:*),Bash(wc:*),Bash(head:*),Bash(date:*)"

      - name: Workflow summary
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ steps.check.outputs.has_new }}" != "true" ]; then
            echo "### Massive Changelog: No new changes in the last 21 days" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "### Massive Changelog: ${{ steps.check.outputs.new_count }} change(s) detected" >> "$GITHUB_STEP_SUMMARY"
          PR_URL=$(gh pr list --head "massive-api-update-${DATE_STAMP}" --json url --jq '.[0].url' 2>/dev/null || true)
          if [ -n "$PR_URL" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**PR opened**: $PR_URL" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "No PR was opened — Claude Code determined no code changes were needed, or the run failed before reaching the PR step. Check the Actions log." >> "$GITHUB_STEP_SUMMARY"
          fi
