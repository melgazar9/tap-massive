      stock_full_market_snapshot:
        query_params:
          include_otc: false

      stock_unified_snapshot:
        query_params:
          type: "stocks"
          limit: 250

      # Tick-level data - 2-3 days for manageable volume
      stock_trades:
        query_params:
          sort: timestamp
          order: "asc"
          timestamp__gte: "2025-02-18T00:00:00Z"
          timestamp__lte: "2025-02-19T23:59:59Z"
          limit: 50000
        other_params:
          use_cached_tickers: true

      stock_last_trade:
        other_params:
