#      - options_quote_snapshots_flat_files_30_minute.*

      # --- Earnings-filtered flat file streams ---
      # Like flat file streams, but only emit rows for tickers with earnings on the file date.
      # Requires per-stream config with earnings_start_date, earnings_end_date, etc.
#      - stocks_earnings_flat_files_eod.*
#      - stocks_earnings_flat_files_1m.*
#      - stocks_earnings_flat_files_trades.*
#      - stocks_earnings_flat_files_quotes.*
#      - options_earnings_flat_files_eod.*
#      - options_earnings_flat_files_1m.*
