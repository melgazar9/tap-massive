      options_earnings_quote_snapshots_30_minute:
        query_params:
          limit: 50000
        other_params:
          earnings_source: postgres
          earnings_data_source: benzinga
          us_only: true
          earnings_db_schema: tap_massive_production
          earnings_start_date: "2026-02-18"
          earnings_end_date: "2026-02-18"

      options_earnings_quote_snapshots_1_hour:
        query_params:
          limit: 50000
        other_params:
          earnings_source: postgres
          earnings_data_source: benzinga
          us_only: true
          earnings_db_schema: tap_massive_production
          earnings_start_date: "2026-02-17"
          earnings_end_date: "2026-02-19"

      # --- Stocks ---
      # The tickers that are set here persist across all streams that require a single stock ticker as input.
      # To run different tickers across different streams you need to call the tap N times,
      # where N is the number of distinct groups of ticker.
      stock_tickers:
        query_params:
          sort: ticker
          limit: 1000
        other_params:
          active: "both"
        select_tickers:
          - "*"
#          - "META"
#          - "TWTR"

      stock_ticker_details:
        query_params: {}

#      stock_ticker_types:
#        query_params: {}
#
#      stock_exchanges:
#        query_params: {}
#
#      stock_condition_codes:
#        query_params: {}

      stock_related_tickers:
        other_params:
          use_cached_tickers: true
      # Second bars - 1-2 days (very high volume)
      stock_bars_1_second:
        path_params:
          multiplier: 1
          timespan: "second"
          from: "2025-01-20"
          to: "2025-01-21"
        query_params:
          adjusted: false
          sort: "asc"
          limit: 50000
        other_params:
          use_cached_tickers: true

      stock_bars_30_second:
        path_params:
          multiplier: 30
          timespan: "second"
          from: "2025-01-20"
          to: "2025-01-21"
        query_params:
          adjusted: false
          sort: "asc"
          limit: 50000
        other_params:
          use_cached_tickers: true

      # Minute bars - 2-3 days (high volume)
      stock_bars_1_minute:
        path_params:
          multiplier: 1
          timespan: "minute"
          from: "2025-01-20"
