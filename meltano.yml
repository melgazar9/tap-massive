    config:
      # set this for a global start date for all streams -- will be overridden by the streams incremental state if that's more recent.

      # 'start_date' here is a global configuration! This overrides the streams config start date param (e.g. timestamp.gte) for all streams.
      # To set start_date earlier than this start date for a specific stream, either comment this start_date block out
      # or set it earlier than the streams start timestamp. The reason for this is because of incremental builds -- it
      # takes the max between this global config and the streams timestamp config param to get the starting timestamp.
      # --- Global ---
      start_date: '2025-01-05T00:00:00Z'

      api_key: ${MASSIVE_API_KEY}
      base_url: https://api.massive.com
      flat_files_base_dir: ${MASSIVE_FLAT_FILES_BASE_DIR}

      duckdb_params:
        threads: 6
        memory_limit: "16GB"
        temp_directory: "~/.cache/duckdb_spill"
        max_temp_directory_size: "50GB"
        preserve_insertion_order: false
        duckdb_batch_size: 1

      # --- Flat file stream date ranges (example) ---
      # stocks_flat_files_1m:
      #   start_file_date: "2026-02-18"
      #   end_file_date: "2026-02-23"

      # --- Quote update bars from flat files (DuckDB aggregation) ---
      # Downloads daily quotes CSV.gz from S3, aggregates to interval bars.
      # flat_file_download_workers: parallel S3 downloads (0 = local files only)
      # s3_subdir: override S3 path (default: us_options_opra/quotes_v1)
      # Files cached in flat_files_base_dir for reuse across intervals.
      # options_quote_snapshots_flat_files_1_minute:
      #   start_file_date: "2022-03-07"
      #   end_file_date: "2026-03-14"
      #   flat_file_download_workers: 5
      #   s3_subdir: "us_options_opra/quotes_v1"

      # --- Earnings-filtered flat file stream config (example) ---
      # Each earnings flat file stream needs its own config block with
      # earnings_start_date and earnings_end_date at minimum.
      # stocks_earnings_flat_files_1m:
      #   earnings_source: postgres
      #   earnings_data_source: both
      #   us_only: true
      #   earnings_db_schema: tap_massive_production
      #   earnings_start_date: "2026-02-18"
      #   earnings_end_date: "2026-02-23"
      #   end_file_date: "2026-02-23"

      postgres_host: ${MELTANO_TAP_MASSIVE_POSTGRES_HOST}
      postgres_port: ${MELTANO_TAP_MASSIVE_POSTGRES_PORT}
      postgres_database: ${MELTANO_TAP_MASSIVE_POSTGRES_DATABASE}
      postgres_user: ${POSTGRES_USER}
      postgres_password: ${POSTGRES_PASSWORD}

      flat_files_aws_key: ${MASSIVE_FLAT_FILE_AWS_KEY}
      flat_files_aws_secret: ${MASSIVE_FLAT_FILE_AWS_SECRET_KEY}

      # --- Earnings-filtered quotes ---
      # earnings_source: "postgres" (default) or "api" (hit Massive API endpoints)
      # earnings_data_source: "both" (default), "benzinga", or "tmx"
      # us_only: true (default) filters out non-US tickers (e.g. .HK, .SA, .TW)
      # earnings_db_schema: postgres schema where benzinga_earnings & tmx_corporate_events live
      stock_earnings_quotes:
        other_params:
          earnings_source: postgres
          earnings_data_source: benzinga
          us_only: true
          earnings_db_schema: tap_massive_production
          earnings_start_date: "2026-02-18"
          earnings_end_date: "2026-02-18"
        query_params:
          sort: timestamp
          order: asc
          limit: 50000

      options_earnings_quotes:
        other_params:
          earnings_source: postgres
          earnings_data_source: benzinga
          us_only: true
          earnings_db_schema: tap_massive_production
          earnings_start_date: "2026-02-18"
          earnings_end_date: "2026-02-18"
        query_params:
          sort: timestamp
          order: asc
          limit: 50000

      # Earnings-filtered quote snapshot streams (sampled at fixed intervals)
      stock_earnings_quote_snapshots_1_second:
