send_anonymous_usage_stats: true

project_id: "tap-massive"

default_environment: test
environments:
- name: test

plugins:
  extractors:
  - name: "tap-massive"
    namespace: "tap_massive"
    pip_url: -e .

    capabilities:
    - state
    - catalog
    - discover
    - about
    - stream-maps

    settings:
    - name: api_key
      kind: password
      label: Massive API Key
      description: Massive API Key
      sensitive: true

    - name: start_date
      kind: date_iso8601
      label: Start Date
      description: Initial date to start extracting data from

    - name: disk_cache_ttl_hours
      kind: integer
      label: Disk Cache TTL Hours
      value: 36
      description: TTL in hours for the shared disk cache (option contracts, tickers). Defaults to ~/.cache; override with MELTANO_SHARED_CACHE_DIR env var.

    - name: duckdb_params
      kind: object
      label: DuckDB Parameters
      description: DuckDB connection parameters (threads, memory_limit, temp_directory, preserve_insertion_order, duckdb_batch_size)

